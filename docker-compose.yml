services:
  postgres:
    image: postgres:16-alpine
    container_name: stardew-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stardew
      POSTGRES_PASSWORD: stardew
      POSTGRES_DB: stardew_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
